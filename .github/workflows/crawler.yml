name: Update Crawler Job

on:
  push:
    branches: [main]
    paths:
      - 'infra/crawler-job.yaml'
      - 'infra/mme-crawler-job.yaml'
      - 'infra/epe-crawler-job.yaml'
      - '.github/workflows/crawler.yml'
  workflow_run:
    workflows: ['Deploy Ingestion']
    types: [completed]
    branches: [main]

jobs:
  update:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Apply crawler job configs
        run: |
          gcloud run jobs replace infra/crawler-job.yaml     --region=us-east4
          gcloud run jobs replace infra/mme-crawler-job.yaml --region=us-east4
          gcloud run jobs replace infra/epe-crawler-job.yaml --region=us-east4
