name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build image
        run: |
          gcloud builds submit \
            --tag us-east4-docker.pkg.dev/enp-securechat/securechat-repo/securechat-backend:latest \
            --region=us-east4 .
        working-directory: backend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy securechat-backend \
            --image us-east4-docker.pkg.dev/enp-securechat/securechat-repo/securechat-backend:latest \
            --region=us-east4
