name: Security Regression — FGA Classification Sync

# Runs whenever code that touches the FGA logic or ingestion pipeline changes.
# A failure here means classification-level filtering is broken and the PR / push
# must not reach production.

on:
  push:
    branches: [main]
    paths:
      - 'ingestion/src/**'
      - 'backend/src/main/java/com/enterprise/securechat/fga/**'
      - 'ingestion/tests/test_classification_fga_integration.py'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ingestion/src/**'
      - 'backend/src/main/java/com/enterprise/securechat/fga/**'
      - 'ingestion/tests/test_classification_fga_integration.py'
      - '.github/workflows/security-audit.yml'
  workflow_dispatch:  # allow manual trigger at any time

jobs:
  fga-classification-audit:
    name: FGA Classification Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      # The sentence-transformers model (~90 MB) is cached between runs.
      # Cache key is tied to requirements.txt so a dep bump invalidates it.
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-minilm-l6-v2-${{ hashFiles('ingestion/requirements.txt') }}
          restore-keys: |
            hf-all-minilm-l6-v2-

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ingestion

      - name: Generate test fixtures
        run: python tests/generate_test_fixtures.py
        working-directory: ingestion

      # Start the embed/ingest API in the background.
      # QDRANT_URL and QDRANT_API_KEY are needed so the ingestion service
      # can write chunks to the Qdrant cloud collection during /ingest calls.
      - name: Start ingestion service
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          uvicorn src.embed_api:app --host 0.0.0.0 --port 8001 &
          echo $! > /tmp/ingestion.pid
        working-directory: ingestion

      # Poll until the model is loaded (up to 2 minutes — first run downloads the model).
      - name: Wait for ingestion service to be ready
        run: |
          for i in $(seq 1 24); do
            STATUS=$(curl -sf http://localhost:8001/health | python3 -c \
              "import sys, json; d=json.load(sys.stdin); print('ok' if d.get('model_loaded') else 'loading')" \
              2>/dev/null || echo "down")
            echo "Attempt $i/24 — $STATUS"
            if [ "$STATUS" = "ok" ]; then break; fi
            sleep 5
          done
          if [ "$STATUS" != "ok" ]; then
            echo "ERROR: Ingestion service did not become ready in time."
            exit 1
          fi

      # The test file skips itself when credentials are absent; CI always has them.
      # pytest exits 1 if any check fails, which fails the workflow step.
      - name: Run FGA classification security audit
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          INGEST_URL: http://localhost:8001
        run: |
          pytest tests/test_classification_fga_integration.py \
            -m integration \
            -v \
            --tb=short \
            --no-header
        working-directory: ingestion

      # Teardown: pytest fixture teardown already deletes the Qdrant test data,
      # but kill the background process regardless of test outcome.
      - name: Stop ingestion service
        if: always()
        run: |
          if [ -f /tmp/ingestion.pid ]; then
            kill "$(cat /tmp/ingestion.pid)" 2>/dev/null || true
          fi
