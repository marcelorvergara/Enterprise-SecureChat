name: Deploy DLP Service

on:
  push:
    branches: [main]
    paths:
      - 'dlp-service/**'
      - '.github/workflows/dlp.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build image
        run: |
          gcloud builds submit \
            --tag us-east4-docker.pkg.dev/enp-securechat/securechat-repo/securechat-dlp:latest \
            --region=us-east4 .
        working-directory: dlp-service

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy securechat-dlp \
            --image us-east4-docker.pkg.dev/enp-securechat/securechat-repo/securechat-dlp:latest \
            --region=us-east4
