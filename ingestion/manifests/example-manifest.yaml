collection: enterprise_knowledge

# Each document entry maps a file to a subject_path.
# The subject_path determines FGA restrictions — restricting "finance" blocks
# all documents under finance/*, finance/payroll, finance/reports, etc.
#
# Optional: add previous_path when a document has moved to a new subject_path.
# The ingestion pipeline always deletes old vectors before writing new ones,
# so previous_path is informational but the delete is unconditional.

documents:
  - path: data/finance/q3-payroll.xlsx
    subject_path: finance/payroll

  - path: data/operations/drilling-plans.pdf
    subject_path: operations/drilling

  - path: data/it/server-runbook.pdf
    subject_path: it-ops/runbooks