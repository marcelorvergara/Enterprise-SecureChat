server:
  port: 3000

spring:
  application:
    name: enterprise-securechat-backend

  # ── Neon PostgreSQL ──────────────────────────────────────────────────────────
  # SPRING_DATASOURCE_URL must be in JDBC format:
  #   jdbc:postgresql://ep-xxxx.region.aws.neon.tech/fga_registry?sslmode=require
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Keep one idle connection warm — avoids Neon cold-start on first request
      minimum-idle: 1
      maximum-pool-size: 5
      # Keepalive prevents Neon from closing idle connections (Neon idles after 5 min)
      keepalive-time: 60000
      connection-timeout: 30000
      max-lifetime: 1800000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  jpa:
    hibernate:
      # Schema is managed by infra/migrations/init.sql applied via Neon SQL Editor
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Auth0 JWT resource server ────────────────────────────────────────────────
  # Spring Security auto-discovers the JWKS endpoint from the issuer's
  # OpenID Connect discovery document and validates iss + aud on every token.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://dev-ll8lyragj23p2c7l.us.auth0.com/}
          audiences: ${AUTH0_AUDIENCE:api.enpsecurechat.com}

# ── External service URLs ────────────────────────────────────────────────────

qdrant:
  url: ${QDRANT_URL}
  api-key: ${QDRANT_API_KEY}
  collection: ${QDRANT_COLLECTION:enterprise_knowledge}

embed-service:
  url: ${EMBED_SERVICE_URL:http://ingestion:8001}
  connect-timeout: 2000
  read-timeout: 90000   # sentence-transformers cold start takes ~60 s on Cloud Run scale-to-zero

dlp-service:
  url: ${DLP_SERVICE_URL:http://dlp-service:8000}
  connect-timeout: 2000
  read-timeout: 60000   # spaCy + Presidio cold start takes ~30 s on Cloud Run scale-to-zero

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: ${CLAUDE_MODEL:claude-sonnet-4-6}

# ── Oil & Gas domain config ───────────────────────────────────────────────────
og:
  # Comma-separated list of known BU names (lowercase). Used by FgaService to
  # compute cross-BU path restrictions from the user's GROUP_BU_xxx authority.
  known-bus: ${OG_KNOWN_BUS:campos,santos,solimoes}

# ── Logging ──────────────────────────────────────────────────────────────────
# Lock HTTP client loggers to WARN. At DEBUG, Spring's RestClient emits request
# headers — which would expose the Anthropic x-api-key. Bodies are not logged
# by SimpleClientHttpRequestFactory (no buffering), but headers alone are
# sufficient to leak credentials. Never lower these below WARN.
logging:
  level:
    root: INFO
    org.springframework.web.client: WARN

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
