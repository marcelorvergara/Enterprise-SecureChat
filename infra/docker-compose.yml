version: "3.9"

networks:
  internal:
    driver: bridge

volumes:
  qdrant_data:

services:

  # ── Qdrant ── Vector database with metadata filtering
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: securechat-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DLP Service ── Presidio-powered redaction (internal only, no public port)
  dlp-service:
    build:
      context: ../dlp-service
      dockerfile: Dockerfile
    container_name: securechat-dlp
    restart: unless-stopped
    environment:
      PORT: 8000
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Ingestion ── Python pipeline
  # Runs the embed API (:8001) permanently so the backend can embed user prompts.
  # One-shot ingest: docker compose run --rm ingestion python -m src.main --manifest manifests/og-manifest.yaml
  ingestion:
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    container_name: securechat-ingestion
    restart: unless-stopped
    environment:
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      EMBEDDING_MODEL: paraphrase-multilingual-MiniLM-L12-v2
      EMBED_SERVICE_PORT: 8001
      UVICORN_WORKERS: 2
    volumes:
      - ../ingestion/data:/app/data
      - ../ingestion/manifests:/app/manifests:ro
    ports:
      - "8001:8001"   # Embed endpoint consumed by backend
    networks:
      - internal
    depends_on:
      qdrant:
        condition: service_started

  # ── Backend ── Spring Boot API
  # App data stored in Neon (NEON_APP_URL)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: securechat-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: enterprise_knowledge
      EMBED_SERVICE_URL: http://ingestion:8001
      DLP_SERVICE_URL: http://dlp-service:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: claude-sonnet-4-6
      INTERNAL_METRICS_KEY: ${INTERNAL_METRICS_KEY}
    depends_on:
      qdrant:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Frontend served via Firebase Hosting in production.
  # Local dev: cd frontend && npm start  (proxies /api/ to localhost:3000 via proxy.conf.json)
